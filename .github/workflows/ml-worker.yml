name: Run Supabase ML Worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - ml-photo-created
      - ml-training-asset-created
      - grower-scout-report-created
      - supabase-ml-queue

concurrency:
  group: supabase-ml-worker
  cancel-in-progress: false

jobs:
  process-pending-ml-jobs:
    name: Process pending ML image jobs
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ml.txt

      - name: Install worker dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ml.txt

      - name: Verify model files are present
        shell: bash
        run: |
          if [ ! -s "${ML_MODEL_PATH:-models/plant_classifier.pt}" ]; then
            echo "::warning::Plant model file is missing. The worker can only produce manual-review results until models are synced."
          fi
          if [ ! -s "${ML_LABELS_PATH:-models/labels.json}" ]; then
            echo "::warning::Label metadata is missing. The worker can only produce manual-review results until labels are synced."
          fi

      - name: Process Supabase ML queue once
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_INVENTORY_FILE_ID: ${{ secrets.GDRIVE_INVENTORY_FILE_ID }}
          ML_JOB_TABLE: v2_ml_image_jobs
          ML_PHOTO_BUCKET: ml_capture_photos
          ML_TRAINING_ASSETS_TABLE: v2_disease_training_assets
          ML_TRAINING_ASSETS_BUCKET: disease_training_assets
          APP_LIVE_EVENTS_TABLE: v2_app_live_events
          GROWER_SCOUT_REPORTS_TABLE: v2_grower_scout_reports
          GROWER_SCOUT_ASSETS_TABLE: v2_grower_scout_assets
          GROWER_SCOUT_AUDIO_BUCKET: grower_scout_audio
          GROWER_SCOUT_PHOTOS_BUCKET: grower_scout_photos
          GROWER_SCOUT_FILES_BUCKET: grower_scout_files
          ML_MODELS_DIR: models
          ML_MODEL_PATH: models/plant_classifier.pt
          ML_LABELS_PATH: models/labels.json
          ML_DIAGNOSTICS_MODEL_PATH: models/diagnostics_classifier.pt
          ML_DIAGNOSTICS_LABELS_PATH: models/diagnostics_labels.json
          ML_BATCH_SIZE: "200"
          ML_POLL_SECONDS: "0"
          ML_RUN_ONCE: "true"
          OLLAMA_URL: ""
          SCOUT_SUMMARY_MODEL: qwen2.5:3b-instruct
          WHISPER_DEVICE: cpu
          WHISPER_COMPUTE_TYPE: int8
          WHISPER_MODEL_SIZE: base
          PUSH_FUNCTION_URL: ${{ secrets.PUSH_FUNCTION_URL }}
          PEST_MANAGEMENT_ALERT_USERNAMES: dylan_collyge
          LOG_LEVEL: INFO
        run: python supabase_ml_worker.py
