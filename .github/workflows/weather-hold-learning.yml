name: Sync Weather Hold Learning

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: weather-hold-learning
  cancel-in-progress: false

jobs:
  sync-weather-hold-learning:
    name: Update Park Hill weather and hold features
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Drive report dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install google-api-python-client==2.169.0 google-auth==2.39.0 pandas==2.2.3 openpyxl==3.1.5 xlrd==2.0.1

      - name: Sync weather and hold learning features
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WEATHER_STATION_KEY: park_hill_ok
          WEATHER_LATITUDE: "35.8615"
          WEATHER_LONGITUDE: "-94.9586"
          WEATHER_TIMEZONE: America/Chicago
          WEATHER_LOOKBACK_DAYS: "92"
          WEATHER_HISTORY_YEARS: "10"
          WEATHER_HISTORY_CHUNK_DAYS: "365"
          WEATHER_HISTORY_MIN_COVERAGE: "0.90"
          WEATHER_HISTORY_FORCE: "false"
          HOLD_WEATHER_REFRESH_LIMIT: "2000"
        run: python sync_weather_hold_learning.py

      - name: Sync Drive Around hold release cycles
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          DRIVE_AROUND_REPORTS_FOLDER_ID: "1hswTWk4GooXIAXFmfdx9I6IyqLJ1LqSA"
          WEATHER_STATION_KEY: park_hill_ok
        run: python sync_drive_around_hold_cycles.py
